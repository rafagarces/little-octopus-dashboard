<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Compare versions — Acme Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../gallery.css" />
  </head>
  <body class="compare-page">
    <div class="compare-bar">
      <a class="btn" href="../">← Gallery</a>
      <span class="label">Left</span>
      <select id="sel-a"></select>
      <span class="label">Right</span>
      <select id="sel-b"></select>
      <span class="spacer"></span>
      <span class="label" id="status"></span>
    </div>
    <div class="compare-frames">
      <iframe id="frame-a" title="Version A"></iframe>
      <iframe id="frame-b" title="Version B"></iframe>
    </div>

    <script>
      (async () => {
        const selA = document.getElementById('sel-a');
        const selB = document.getElementById('sel-b');
        const frameA = document.getElementById('frame-a');
        const frameB = document.getElementById('frame-b');
        const status = document.getElementById('status');

        let data;
        try {
          const res = await fetch('../versions.json', { cache: 'no-store' });
          data = await res.json();
        } catch (e) {
          status.textContent = 'versions.json not found';
          return;
        }

        const options = [];
        if (data.latest && data.latest.available) {
          options.push({ value: 'latest', label: 'Latest (main)', href: '../latest/' });
        }
        for (const v of data.versions) {
          if (!v.available) continue;
          options.push({
            value: v.tag,
            label: `${v.tag} — ${v.date}`,
            href: `../versions/${encodeURIComponent(v.tag)}/`,
          });
        }

        if (options.length < 2) {
          status.textContent = 'Need at least two built versions to compare.';
          return;
        }

        for (const sel of [selA, selB]) {
          for (const opt of options) {
            const o = document.createElement('option');
            o.value = opt.value;
            o.textContent = opt.label;
            sel.appendChild(o);
          }
        }

        const params = new URLSearchParams(location.search);
        const initialA = params.get('a') || options[options.length - 1].value; // oldest
        const initialB = params.get('b') || options[0].value;                  // newest
        selA.value = options.some((o) => o.value === initialA) ? initialA : options[0].value;
        selB.value = options.some((o) => o.value === initialB) ? initialB : options[options.length - 1].value;

        function apply() {
          const a = options.find((o) => o.value === selA.value);
          const b = options.find((o) => o.value === selB.value);
          if (a) frameA.src = a.href;
          if (b) frameB.src = b.href;
          const url = new URL(location.href);
          url.searchParams.set('a', selA.value);
          url.searchParams.set('b', selB.value);
          history.replaceState(null, '', url.toString());
        }

        selA.addEventListener('change', apply);
        selB.addEventListener('change', apply);
        apply();
      })();
    </script>
  </body>
</html>
